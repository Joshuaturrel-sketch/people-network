<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>People Network</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

<div id="loader">Loading contacts…</div>
<div id="error-banner" hidden></div>

<div class="app-shell">
  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-left">
      <!-- SVG Logo -->
      <a class="logo" href="#">
        <svg aria-label="People Network" width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="9"  r="4" fill="currentColor" opacity="0.9"/>
          <circle cx="6"  cy="21" r="3" fill="currentColor" opacity="0.7"/>
          <circle cx="22" cy="21" r="3" fill="currentColor" opacity="0.7"/>
          <line x1="14" y1="13" x2="6"  y2="18" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
          <line x1="14" y1="13" x2="22" y2="18" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
          <line x1="6"  y1="21" x2="22" y2="21" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
        </svg>
        People Network
      </a>

      <!-- Tabs -->
      <nav class="tab-nav" aria-label="Views">
        <button class="tab-btn active" data-tab="stats"   aria-controls="panel-stats">Stats</button>
        <button class="tab-btn"        data-tab="people"  aria-controls="panel-people">People</button>
        <button class="tab-btn"        data-tab="mindmap" aria-controls="panel-mindmap">Mind Map</button>
        <button class="tab-btn"        data-tab="map"     aria-controls="panel-map">Map</button>
      </nav>
    </div>

    <div class="topbar-right">
      <input id="search" type="search" placeholder="Search contacts…" aria-label="Search contacts">
      <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Panels -->
  <main class="main-content">

    <!-- Stats -->
    <section id="panel-stats" class="tab-panel" role="tabpanel">
      <div class="kpi-row">
        <div class="kpi-card"><div class="kpi-label">Total Contacts</div><div class="kpi-value" id="kpi-total">—</div></div>
        <div class="kpi-card"><div class="kpi-label">Active Clients</div><div class="kpi-value" id="kpi-clients">—</div></div>
        <div class="kpi-card"><div class="kpi-label">Prospects</div><div class="kpi-value" id="kpi-prospects">—</div></div>
        <div class="kpi-card"><div class="kpi-label">Strong Relations</div><div class="kpi-value" id="kpi-strong">—</div></div>
      </div>

      <div class="chart-grid">
        <div class="chart-card"><canvas id="chart-category"></canvas></div>
        <div class="chart-card"><canvas id="chart-layer"></canvas></div>
        <div class="chart-card"><canvas id="chart-strength"></canvas></div>
        <div class="chart-card"><canvas id="chart-status"></canvas></div>
        <div class="chart-card"><canvas id="chart-probability"></canvas></div>
        <div class="chart-card"><canvas id="chart-city"></canvas></div>
        <div class="chart-card"><canvas id="chart-growth"></canvas></div>
        <div class="chart-card"><canvas id="chart-industry"></canvas></div>
      </div>
    </section>

    <!-- People Table -->
    <section id="panel-people" class="tab-panel" role="tabpanel" hidden>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th><th>Category</th><th>Layer</th>
              <th>Strength</th><th>Client Status</th><th>City</th><th>Industry</th>
            </tr>
          </thead>
          <tbody id="people-tbody"></tbody>
        </table>
      </div>
    </section>

    <!-- Mind Map -->
    <section id="panel-mindmap" class="tab-panel" role="tabpanel" hidden>
      <div id="mindmap-container"></div>
    </section>

    <!-- Map -->
    <section id="panel-map" class="tab-panel" role="tabpanel" hidden>
      <div id="map-container"></div>
    </section>

  </main>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

<script>
// Dark mode toggle (inline — runs before module load)
(function(){
  const r = document.documentElement;
  const d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  r.setAttribute('data-theme', d);
  const btn = document.querySelector('[data-theme-toggle]');
  if (btn) btn.addEventListener('click', () => {
    const next = r.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    r.setAttribute('data-theme', next);
  });
})();
</script>

<script type="module" src="./app.js"></script>
</body>
</html>
