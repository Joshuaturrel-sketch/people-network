<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>People Network Mindmap</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="loading">Loading people network…</div>

  <div id="app">
    <header class="header">
      <div class="header-title">People Network Mindmap</div>
      <div class="header-meta" id="kpi-summary"></div>
    </header>

    <main class="main">
      <section class="view active" id="view-mindmap">
        <div class="layout">
          <div class="card">
            <h3>Mindmap</h3>
            <div id="mindmap-container"></div>
          </div>

          <aside class="details-card" id="person-details">
            <h3>Details</h3>
            <div class="details-empty">Hover or click a node to see details.</div>
            <div class="details-body" hidden>
              <div class="details-name" id="details-name"></div>

              <div class="details-row">
                <span>Layer</span>
                <span id="details-layer"></span>
              </div>

              <div class="details-row">
                <span>Category</span>
                <span id="details-category"></span>
              </div>

              <div class="details-row">
                <span>Jobs / Industry</span>
                <span id="details-industry"></span>
              </div>

              <div class="details-row">
                <span>Client status</span>
                <span id="details-status"></span>
              </div>

              <div class="details-row">
                <span>City / Country</span>
                <span id="details-city"></span>
              </div>

              <div class="details-row">
                <span>Relationship strength</span>
                <span id="details-strength"></span>
              </div>

              <div class="details-row">
                <span>Connections</span>
                <span id="details-degree"></span>
              </div>
            </div>
          </aside>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
